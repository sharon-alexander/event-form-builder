<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Event Inquiry</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
      }
      #roscioli-event-form {
        max-width: 1120px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <!--
      Location is resolved in this order:
        1. data-location attribute on the mount element
        2. ?location= query parameter
        3. Default (pearl-box)

      Examples:
        <div id="roscioli-event-form" data-location="roscioli"></div>
        http://localhost:5173/?location=tokyo-record-bar

      Valid location IDs: pearl-box, roscioli, tokyo-record-bar
    -->
    <div id="roscioli-event-form"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
