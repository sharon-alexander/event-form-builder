<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Event Inquiry</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Standalone preview page only (this file is NOT used by the Squarespace
         embed). Center the form and cap its width so it doesn't stretch edge to
         edge on large screens. On narrow/mobile viewports the max-width is a
         no-op and the form fills the screen, with its own padding for gutters. */
      body {
        margin: 0;
      }
      #roscioli-event-form {
        max-width: 1120px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="roscioli-event-form"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
